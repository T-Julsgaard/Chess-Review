<h2 class="sr-only">Animated portrait of a bearded professor in a tweed jacket holding a leather book, with controllable facial expressions, glances, gestures and a raisable book.</h2>
<style>
:root{ --font-sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.coach-wrap{padding:.5rem 0}
.coach-svg{width:100%;max-width:300px;display:block;margin:0 auto;height:auto}
.coach-ctrl{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:360px;margin:14px auto 0}
.coach-ctrl button{font-family:var(--font-sans,sans-serif);font-size:13px;font-weight:400;padding:6px 10px;border-radius:var(--border-radius-md,8px);border:1px solid var(--color-border-secondary,#3a352f);background:var(--color-background-secondary,#2a2622);color:var(--color-text-primary,#ece6da);cursor:pointer}
.coach-ctrl button:hover{border-color:var(--color-border-primary,#5a5248)}
.coach-ctrl button.on{background:var(--color-text-primary,#ece6da);color:var(--color-background-primary,#1a1815);border-color:var(--color-text-primary,#ece6da)}
.coach-ctrl .look{min-width:30px;padding:5px 0}
.coach-sep{width:100%;height:0}
#figure{animation:p_br 6s ease-in-out infinite}
#head{transform-box:view-box;transform-origin:340px 370px;animation:p_tilt 9s ease-in-out infinite}
#stache{transform-box:view-box;transform-origin:340px 340px;animation:p_twitch 7.4s ease-in-out infinite}
#bookarms{transform-box:view-box;transform-origin:340px 690px;transition:transform .8s cubic-bezier(.5,0,.3,1)}
#bookarms.raised{transform:translateY(-46px)}
@keyframes p_br{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
@keyframes p_tilt{0%,100%{transform:rotate(0deg)}30%{transform:rotate(-1deg)}66%{transform:rotate(.8deg)}}
@keyframes p_twitch{0%,88%,100%{transform:translateX(0)}93%{transform:translateX(2px) rotate(.6deg)}}
@media (prefers-reduced-motion:reduce){#figure,#head,#stache{animation:none}}
</style>
