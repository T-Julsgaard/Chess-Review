<h2 class="sr-only">Animated portrait of a bright eager 11-year-old chess prodigy with a neat brown haircut, big intelligent eyes and a navy polo shirt, proudly holding up a small gold chess trophy. Controllable expressions, glances and gestures.</h2>
<style>
:root{ --font-sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.coach-wrap{padding:.5rem 0}
.coach-svg{width:100%;max-width:300px;display:block;margin:0 auto;height:auto}
.coach-ctrl{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:360px;margin:14px auto 0}
.coach-ctrl button{font-family:var(--font-sans,sans-serif);font-size:13px;font-weight:400;padding:6px 10px;border-radius:var(--border-radius-md,8px);border:1px solid var(--color-border-secondary,#3a352f);background:var(--color-background-secondary,#2a2622);color:var(--color-text-primary,#ece6da);cursor:pointer}
.coach-ctrl button:hover{border-color:var(--color-border-primary,#5a5248)}
.coach-ctrl button.on{background:var(--color-text-primary,#ece6da);color:var(--color-background-primary,#1a1815);border-color:var(--color-text-primary,#ece6da)}
.coach-ctrl .look{min-width:30px;padding:5px 0}
.coach-sep{width:100%;height:0}
#figure{animation:k_br 5s ease-in-out infinite}
#head{transform-box:view-box;transform-origin:340px 380px;animation:k_tilt 7.6s ease-in-out infinite}
#trophygroup{transform-box:view-box;transform-origin:340px 640px;transition:transform .7s cubic-bezier(.4,0,.3,1.3)}
#trophygroup.raised{transform:translateY(-58px)}
@keyframes k_br{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
@keyframes k_tilt{0%,100%{transform:rotate(0deg)}30%{transform:rotate(-1.3deg)}66%{transform:rotate(1.1deg)}}
@media (prefers-reduced-motion:reduce){#figure,#head{animation:none}}
</style>
