<h2 class="sr-only">Animated portrait of a sweet elderly grandmother with silver hair in a bun, round glasses on a beaded chain and a pastel knitted cardigan, continuously crocheting a small square while glancing down at it. Controllable expressions, glances and gestures.</h2>
<style>
:root{ --font-sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.coach-wrap{padding:.5rem 0}
.coach-svg{width:100%;max-width:300px;display:block;margin:0 auto;height:auto}
.coach-ctrl{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:360px;margin:14px auto 0}
.coach-ctrl button{font-family:var(--font-sans,sans-serif);font-size:13px;font-weight:400;padding:6px 10px;border-radius:var(--border-radius-md,8px);border:1px solid var(--color-border-secondary,#3a352f);background:var(--color-background-secondary,#2a2622);color:var(--color-text-primary,#ece6da);cursor:pointer}
.coach-ctrl button:hover{border-color:var(--color-border-primary,#5a5248)}
.coach-ctrl button.on{background:var(--color-text-primary,#ece6da);color:var(--color-background-primary,#1a1815);border-color:var(--color-text-primary,#ece6da)}
.coach-ctrl .look{min-width:30px;padding:5px 0}
.coach-sep{width:100%;height:0}
#figure{animation:g_br 6.4s ease-in-out infinite}
#head{transform-box:view-box;transform-origin:340px 360px;animation:g_tilt 10s ease-in-out infinite}
#hookhand{transform-box:view-box;transform-origin:300px 655px}
#hookhand.crocheting{animation:g_hook 1.15s ease-in-out infinite}
#yarnball{transform-box:view-box;transform-origin:447px 664px}
#yarnball.crocheting{animation:g_yarn 2.3s ease-in-out infinite}
#worksq{transform-box:view-box;transform-origin:340px 660px}
#worksq.crocheting{animation:g_sq 1.15s ease-in-out infinite}
@keyframes g_br{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
@keyframes g_tilt{0%,100%{transform:rotate(0deg)}30%{transform:rotate(-1deg)}66%{transform:rotate(.9deg)}}
@keyframes g_hook{0%{transform:translate(0,0) rotate(0deg)}28%{transform:translate(5px,4px) rotate(7deg)}55%{transform:translate(1px,-3px) rotate(-2deg)}78%{transform:translate(-2px,1px) rotate(-5deg)}100%{transform:translate(0,0) rotate(0deg)}}
@keyframes g_yarn{0%,100%{transform:rotate(0deg) translateY(0)}40%{transform:rotate(4deg) translateY(-2px)}70%{transform:rotate(-3deg) translateY(1px)}}
@keyframes g_sq{0%,100%{transform:translate(0,0)}30%{transform:translate(-1.5px,1px)}60%{transform:translate(1px,-1px)}}
@media (prefers-reduced-motion:reduce){#figure,#head,#hookhand,#yarnball,#worksq{animation:none}}
</style>
