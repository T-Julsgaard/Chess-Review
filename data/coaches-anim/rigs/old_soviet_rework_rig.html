<h2 class="sr-only">Animated portrait of a stern Soviet coach in a fur ushanka holding a steaming glass of tea, with controllable facial expressions and a raisable cup.</h2>
<style>
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.coach-wrap{padding:.5rem 0}
.coach-svg{width:100%;max-width:420px;display:block;margin:0 auto;height:auto}
.coach-ctrl{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:440px;margin:14px auto 0}
.coach-ctrl button{font-family:var(--font-sans,sans-serif);font-size:13px;font-weight:400;padding:6px 12px;border-radius:var(--border-radius-md,8px);border:1px solid var(--color-border-secondary,#3a352f);background:var(--color-background-secondary,#2a2622);color:var(--color-text-primary,#ece6da);cursor:pointer}
.coach-ctrl button:hover{border-color:var(--color-border-primary,#5a5248)}
.coach-ctrl button.on{background:var(--color-text-primary,#ece6da);color:var(--color-background-primary,#1a1815);border-color:var(--color-text-primary,#ece6da)}
.coach-sep{width:100%;height:0}
.coach-ctrl .look{min-width:30px;padding:5px 0}
#figure{animation:c_br 5s ease-in-out infinite}
#head{transform-box:view-box;transform-origin:340px 600px;animation:c_tilt 9s ease-in-out infinite}
#cupgroup{transform-box:view-box;transform-origin:250px 792px;transition:transform .9s cubic-bezier(.5,0,.3,1)}
#cupgroup.raised{transform:translateY(-152px) rotate(-4deg)}
.stm{transform-box:fill-box;transform-origin:bottom;animation:c_steam 3.2s ease-in-out infinite}
.stm.s2{animation-duration:3.8s;animation-delay:1.1s}
.stm.s3{animation-duration:2.9s;animation-delay:.6s}
@keyframes c_br{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
@keyframes c_tilt{0%,100%{transform:rotate(0deg)}30%{transform:rotate(-.8deg)}66%{transform:rotate(.7deg)}}
@keyframes c_steam{0%{opacity:0;transform:translateY(6px) scaleY(.8)}25%{opacity:.5}100%{opacity:0;transform:translateY(-34px) scaleY(1.25)}}
@media (prefers-reduced-motion:reduce){#figure,#head,.stm{animation:none}}
</style>
